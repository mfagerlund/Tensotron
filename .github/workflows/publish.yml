name: Publish Tensotron to NuGet

# Trusted publishing (OIDC → short-lived key) — no stored API key.
# nuget.org policy: Repository Owner = mfagerlund, Repository = Tensotron, Workflow File = publish.yml.
# Publish is gated on the test job so a broken tag can't ship an immutable package.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Test (managed SIMD CPU backend)
        env:
          TENSOTRON_BACKEND: simd
        run: dotnet test Tensotron.sln --configuration Release --filter "FullyQualifiedName!~TraceReplay&FullyQualifiedName!~AllocatorPool&FullyQualifiedName!~Device&FullyQualifiedName!~TiledMatMul&FullyQualifiedName!~BatchedCuBlas&Category!=Showcase"

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # enable GitHub OIDC token issuance for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer derives the version from git history + tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/Tensotron/Tensotron.csproj -c Release -o artifacts

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: mfagerlund   # nuget.org profile name (not email)

      - name: Push
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
