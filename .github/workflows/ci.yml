name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build Tensotron.sln --configuration Release

      # CI runners have no CUDA GPU. The parity suite still runs in full on the CPU backend; the
      # slow GPU-only Showcase convergence demos are filtered out (they SkippableFact-skip anyway).
      - name: Test (default backend)
        run: dotnet test Tensotron.sln --configuration Release --no-build --filter "Category!=Showcase"

      - name: Test (managed SIMD backend)
        env:
          TENSOTRON_BACKEND: simd
        run: dotnet test Tensotron.sln --configuration Release --no-build --filter "Category!=Showcase"

      - name: Pack (verify the NuGet package builds)
        run: dotnet pack src/Tensotron/Tensotron.csproj --configuration Release --no-build
