name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # MinVer derives the version from git history + tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build Tensotron.sln --configuration Release

      # GitHub runners have no CUDA GPU, so the runtime's Auto backend resolves to the managed
      # SIMD CPU backend — the op-parity suite runs in full there. The ILGPU device-internal test
      # classes (trace/replay, allocator-pool, device-probe, tiled-GEMM, cuBLAS-batched) need a
      # real ILGPU accelerator and are excluded, exactly mirroring tools/run-tests.ps1 -Simd. The
      # slow GPU-only Showcase convergence demos SkippableFact-skip without CUDA.
      - name: Test (managed SIMD CPU backend)
        env:
          TENSOTRON_BACKEND: simd
        run: dotnet test Tensotron.sln --configuration Release --no-build --filter "FullyQualifiedName!~TraceReplay&FullyQualifiedName!~AllocatorPool&FullyQualifiedName!~Device&FullyQualifiedName!~TiledMatMul&FullyQualifiedName!~BatchedCuBlas&Category!=Showcase"

      - name: Pack (verify the NuGet package builds)
        run: dotnet pack src/Tensotron/Tensotron.csproj --configuration Release --no-build
